apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberguard-elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cyberguard-elasticsearch
  template:
    metadata:
      labels:
        app: cyberguard-elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
        env:
        - name: discovery.type
          value: "single-node"
        - name: xpack.security.enabled
          value: "false"
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        ports:
        - containerPort: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: cyberguard-elasticsearch
spec:
  ports:
  - port: 9200
    targetPort: 9200
  selector:
    app: cyberguard-elasticsearch
