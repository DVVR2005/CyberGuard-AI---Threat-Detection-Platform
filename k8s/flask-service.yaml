apiVersion: v1
kind: Service
metadata:
  name: cyberguard-flask-service
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
  selector:
    app: cyberguard-flask
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cyberguard-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cyberguard-flask-service
            port:
              number: 5000
