<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CyberGuard AI - Advanced AI-Powered Threat Detection Platform for comprehensive cybersecurity scanning, vulnerability assessment, and threat intelligence.">
    <meta name="keywords" content="cybersecurity, threat detection, vulnerability scanner, AI security, OWASP, CVE">
    <meta name="author" content="CyberGuard AI">
    <meta name="theme-color" content="#060a13">
    <title>CyberGuard AI | Threat Detection Platform</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/KVZGKEOmFOSN4UIBS2T5P2B7IKZJQV" crossorigin="anonymous">

    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 3D Ambient Glowing Background Blobs -->
    <div class="glow-blob glow-blob-1"></div>
    <div class="glow-blob glow-blob-2"></div>
    <div class="glow-blob glow-blob-3"></div>

    <div id="app">
        <!-- ============================================================ -->
        <!-- AUTH CONTAINER (visible when not authenticated) -->
        <!-- ============================================================ -->
        <div id="auth-container">
            <!-- Content injected by auth.js -->
        </div>

        <!-- ============================================================ -->
        <!-- DASHBOARD CONTAINER (visible when authenticated) -->
        <!-- ============================================================ -->
        <div id="dashboard-container" style="display:none;">

            <!-- Mobile Sidebar Toggle -->
            <button id="sidebar-toggle" aria-label="Toggle navigation">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>

            <!-- ====================================================== -->
            <!-- SIDEBAR -->
            <!-- ====================================================== -->
            <aside id="sidebar">
                <!-- Logo -->
                <div class="sidebar-logo">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#06b6d4" stroke-width="1.5" fill="rgba(6,182,212,0.08)"/>
                        <path d="M9 12l2 2 4-4" stroke="#10b981" stroke-width="2" fill="none"/>
                    </svg>
                    <div class="sidebar-logo-text">
                        <h2>CyberGuard AI</h2>
                        <p>Threat Detection Platform</p>
                    </div>
                </div>

                <!-- Tenant workspace selector -->
                <div class="tenant-workspace-selector" style="padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 0.8rem; color: #64748b; display: flex; flex-direction: column; gap: 8px;">
                    <div>
                        <span>Workspace: </span>
                        <span id="current-workspace-name" style="font-weight: 600; color: #06b6d4;">Default Org</span>
                    </div>
                    <!-- Theme Selector -->
                    <div style="display: flex; align-items: center; gap: 6px; margin-top: 4px;">
                        <span style="font-size: 11px;">Theme:</span>
                        <select id="theme-select" style="background: rgba(15,23,42,0.8); border: 1px solid rgba(6,182,212,0.3); border-radius: 4px; color: var(--text-primary); font-size: 11px; padding: 2px 6px; outline: none; cursor: pointer;">
                            <option value="cyber-glow">Cyber Glow</option>
                            <option value="glass-matrix">Glass Matrix</option>
                            <option value="aura-crimson">Aura Crimson</option>
                            <option value="synthwave">Synthwave Sunset</option>
                            <option value="light-corporate">Light Mode</option>
                        </select>
                    </div>
                </div>

                <!-- Navigation -->
                <nav class="sidebar-nav">
                    <a class="nav-item active" data-route="dashboard" href="#dashboard">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7" rx="1"/>
                            <rect x="14" y="3" width="7" height="7" rx="1"/>
                            <rect x="3" y="14" width="7" height="7" rx="1"/>
                            <rect x="14" y="14" width="7" height="7" rx="1"/>
                        </svg>
                        <span>Dashboard</span>
                    </a>
                    <a class="nav-item" data-route="scanner" href="#scanner">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35"/>
                            <path d="M11 8v6"/>
                            <path d="M8 11h6"/>
                        </svg>
                        <span>Scanner</span>
                    </a>
                    <a class="nav-item" data-route="threat-intel" href="#threat-intel">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            <line x1="12" y1="9" x2="12" y2="13"/>
                            <line x1="12" y1="17" x2="12.01" y2="17"/>
                        </svg>
                        <span>Threat Intel</span>
                    </a>
                    <a class="nav-item" data-route="siem" id="nav-siem" href="#siem" style="display:none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="4" y1="21" x2="4" y2="14"/>
                            <line x1="4" y1="10" x2="4" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="12"/>
                            <line x1="12" y1="8" x2="12" y2="3"/>
                            <line x1="20" y1="21" x2="20" y2="16"/>
                            <line x1="20" y1="12" x2="20" y2="3"/>
                            <line x1="2" y1="14" x2="6" y2="14"/>
                            <line x1="10" y1="8" x2="14" y2="8"/>
                            <line x1="18" y1="16" x2="22" y2="16"/>
                        </svg>
                        <span>SIEM Logs</span>
                    </a>
                    <a class="nav-item" data-route="ai" href="#ai">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                        <span>AI Advisor</span>
                    </a>
                    <a class="nav-item" data-route="research" href="#research">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="20" x2="18" y2="10"/>
                            <line x1="12" y1="20" x2="12" y2="4"/>
                            <line x1="6" y1="20" x2="6" y2="14"/>
                        </svg>
                        <span>Research Metrics</span>
                    </a>
                    <a class="nav-item" data-route="reports" href="#reports">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <polyline points="10 9 9 9 8 9"/>
                        </svg>
                        <span>Reports</span>
                    </a>
                    <a class="nav-item" data-route="guide" href="#guide">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                            <line x1="12" y1="17" x2="12.01" y2="17"/>
                        </svg>
                        <span>Scoring Guide</span>
                    </a>
                    <a class="nav-item" data-route="profile" href="#profile">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span>Profile Settings</span>
                    </a>
                    <a class="nav-item" data-route="admin" id="nav-admin" href="#admin" style="display:none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                        <span>Admin Panel</span>
                    </a>
                </nav>

                <!-- User Section -->
                <div class="sidebar-user">
                    <div class="user-avatar">
                        <span id="user-initials">?</span>
                    </div>
                    <div class="user-info">
                        <span id="user-name">User</span>
                        <span id="user-role" class="role-badge role-analyst">analyst</span>
                    </div>
                    <button id="logout-btn" title="Logout">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                    </button>
                </div>
            </aside>

            <!-- ====================================================== -->
            <!-- MAIN CONTENT -->
            <!-- ====================================================== -->
            <main id="main-content">
                <div id="page-content" class="page-enter">
                    <!-- Page content injected by router -->
                </div>
            </main>
        </div>
    </div>

    <!-- Socket.io 4.x client -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- Chart.js 4.x -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <!-- Bootstrap 5.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- Application Scripts -->
    <script src="/static/js/app.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script src="/static/js/scanner.js"></script>
    <script src="/static/js/threat_intel.js"></script>
    <script src="/static/js/siem.js"></script>
    <script src="/static/js/ai.js"></script>
    <script src="/static/js/research.js"></script>
    <script src="/static/js/reports.js"></script>
    <script src="/static/js/guide.js"></script>
    <script src="/static/js/admin.js"></script>
    <script src="/static/js/profile.js"></script>
</body>
</html>
